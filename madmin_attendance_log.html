<!DOCTYPE html>
<html>

<head>
  <title>Attendance Log - Master Admin</title>

  <!-- ✅ Mobile support -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial;
      background: #eaf3ff;
    }

    /* ===== HEADER ===== */
    .header {
      background: #0066cc;
      color: white;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      padding: 10px;
    }

    .logo {
      height: 40px;
    }

    .title {
      flex: 1;
      text-align: center;
      font-size: 16px;
    }

    /* ===== CONTAINER ===== */
    .container {
      max-width: 900px;
      margin: 20px auto;
      padding: 15px;
      text-align: center;
    }

    /* ===== INPUT & BUTTON ===== */
    input {
      padding: 10px;
      margin: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 18px;
      margin: 6px;
      border: none;
      border-radius: 6px;
      background: #0066cc;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #004a99;
    }

    .red {
      background: #d32f2f;
    }

    .red:hover {
      background: #a30000;
    }

    /* ===== TABLE ===== */
    .table-wrapper {
      width: 100%;
      overflow-x: auto;
      margin-top: 15px;
    }

    table {
      width: 100%;
      min-width: 600px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #0066cc;
      color: white;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {

      .header {
        flex-direction: column;
        text-align: center;
      }

      .title {
        width: 100%;
        margin-top: 5px;
      }

      input {
        width: 90%;
      }

      button {
        width: 90%;
        max-width: 300px;
      }
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <img src="img/thanthai-hans-roever-college-1.png" class="logo">
    <h2 class="title">Roevers College Attendance System</h2>
  </header>

  <!-- MAIN -->
  <div class="container">

    <h2>Attendance Log - Master Admin</h2>

    <!-- INPUT -->
    <div>
      <label>Select Date:</label><br>
      <input type="date" id="logDate">
    </div>

    <!-- BUTTONS -->
    <div>
      <button onclick="loadAttendanceLog()">Load</button>
      <button onclick="downloadPDF()">Download PDF</button>
      <button class="red" onclick="location.href='master-dashboard.html'">Back</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Department</th>
            <th>Date</th>
            <th>Total Students</th>
            <th>Present</th>
            <th>Absent</th>
          </tr>
        </thead>
        <tbody id="attendanceLogTable"></tbody>
      </table>
    </div>

  </div>

  <script>
    const BASE_URL = "https://attendancesystem-in29.onrender.com/api";
    const token = localStorage.getItem("token");
    let attendanceData = [];

    async function loadAttendanceLog() {
      const date = document.getElementById("logDate").value;

      try {
        const res = await fetch(`${BASE_URL}/master/attendance-log${date ? '?date=' + date : ''}`, {
          headers: { "Authorization": "Bearer " + token }
        });

        const log = await res.json();
        attendanceData = log;

        const tbody = document.getElementById("attendanceLogTable");
        tbody.innerHTML = "";

        if (!log.length) {
          tbody.innerHTML = "<tr><td colspan='5'>No data found</td></tr>";
          return;
        }

        log.forEach(item => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${item.department}</td>
            <td>${item.date}</td>
            <td>${item.totalStudents}</td>
            <td>${item.present}</td>
            <td>${item.absent}</td>
          `;
          tbody.appendChild(tr);
        });

      } catch (err) {
        alert("Error: " + err.message);
      }
    }

    function downloadPDF() {
      if (!attendanceData.length) {
        alert("Load data first");
        return;
      }

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      doc.text("Attendance Log - Master Admin", 14, 15);

      const columns = ["Department", "Date", "Total Students", "Present", "Absent"];
      const rows = attendanceData.map(d => [
        d.department,
        d.date,
        d.totalStudents,
        d.present,
        d.absent
      ]);

      doc.autoTable({
        head: [columns],
        body: rows,
        startY: 20
      });

      doc.save("Attendance_Log.pdf");
    }

    document.addEventListener("DOMContentLoaded", () => {
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById("logDate").value = today;
      loadAttendanceLog();
    });
  </script>

</body>

</html>
