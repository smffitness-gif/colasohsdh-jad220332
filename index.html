<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>THRC</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/logo.png">
</head>

<body>

    <header class="header">
        <img src="img/thanthai-hans-roever-college-1.png" alt="Logo" class="logo">
        <h2 class="center" style="padding-left: 35%;">Roevers College Attendance System</h2>
    </header>

    <div class="center" style="padding-top: 250px;">
        <input id="loginUser" placeholder="Username">
        <input id="loginPass" type="password" placeholder="Password">
    </div>

    <div class="center">
        <button id="loginBtn">Login</button>
    </div>

    <div id="loginMsg" class="center"></div>

    <script src="login.js" defer></script>

</body>

</html>
