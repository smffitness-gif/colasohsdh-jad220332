<!DOCTYPE html>
<html>

<head>
  <title>Students - Master Admin</title>
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <h1>Students - Master Admin</h1>
  <header class="header">
    <img src="img/thanthai-hans-roever-college-1.png" alt="Logo" class="logo">
    <h2 class="center" style="padding-left: 35%;">Roevers College Attendance System</h2>
  </header>

  <h3 id="departmentTitle"></h3>

  <label for="yearSelect">Select Year:</label>
  <select id="yearSelect">
    <option value="1">1st Year</option>
    <option value="2">2nd Year</option>
    <option value="3">3rd Year</option>
  </select>
  <button onclick="loadStudents()">Load Students</button>
  <button class="red" onclick="location.href='master-dashboard.html'">Back</button>


  <table>
    <thead>
      <tr>
        <th>Student ID</th>
        <th>Name</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="studentsTable"></tbody>
  </table>

  <script>
    const BASE_URL = "https://attendancesystem-in29.onrender.com/api";
    const token = localStorage.getItem("token");
    const department = localStorage.getItem("madmin_department");
    document.getElementById("departmentTitle").innerText = `Department: ${department}`;

    async function loadStudents() {
      const year = document.getElementById("yearSelect").value;
      try {
        const res = await fetch(`${BASE_URL}/master/students/${department}/${year}`, {
          headers: { "Authorization": "Bearer " + token }
        });
        const students = await res.json();
        const tbody = document.getElementById("studentsTable");
        tbody.innerHTML = "";

        if (students.length === 0) {
          tbody.innerHTML = `<tr><td colspan="3">No student data available</td></tr>`;
          return;
        }


        students.forEach(student => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
        <td><input type="text" value="${student.studentId}" id="sid_${student._id}"></td>
        <td><input type="text" value="${student.studentName}" id="sname_${student._id}"></td>
        <td><button onclick="updateStudent('${student._id}')">Save</button></td>
      `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error(err);
        alert("Failed to load students");
      }
    }

    async function updateStudent(id) {
      const studentId = document.getElementById(`sid_${id}`).value;
      const studentName = document.getElementById(`sname_${id}`).value;
      try {
        const res = await fetch(`${BASE_URL}/master/student/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({ studentId, studentName })
        });
        const data = await res.json();
        alert(data.message);
      } catch (err) {
        console.error(err);
        alert("Failed to update student");
      }
    }
  </script>

</body>

</html>
