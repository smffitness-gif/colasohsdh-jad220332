<!DOCTYPE html>
<html>

<head>
    <title>Department Admin Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Segoe UI, Arial;
            background: linear-gradient(135deg, #45b1e8, #764ba2);
            background-color: #45b1e8;
            min-height: 100vh;
            background-size: cover;
            text-align: center;
            background-position: center;
        }

        .header {
            width: 100%;
            height: 70px;
            background: #ffffff;
            display: flex;
            align-items: center;
            padding-left: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Logo */
        .logo {
            height: 50px;
        }

        h1,
        h2 {
            margin-bottom: 20px;
        }

        button {
            padding: 15px 25px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background: #3498db;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }
    </style>
</head>

<body>
    <header class="header">
        <img src="img/thanthai-hans-roever-college-1.png" alt="Logo" class="logo">
        <h2 class="center" style="padding-left: 35%;">Roevers College Attendance System</h2>
    </header>

    <h1>Department Admin Dashboard</h1>
    <h2 id="deptTitle"></h2>
    <div id="yearButtons"></div>

    <script>
        // Get current user from localStorage
        const currentUser = JSON.parse(localStorage.getItem("currentUser"));

        // If not logged in or not departmentAdmin, redirect
        if (!currentUser || currentUser.role !== "departmentAdmin") {
            window.location.href = "index.html";
        }

        // Set department title
        document.getElementById("deptTitle").innerText = `${currentUser.department} Department`;

        // Generate buttons dynamically for years 1-3
        const yearButtonsDiv = document.getElementById("yearButtons");

        for (let year = 1; year <= 3; year++) {
            const btn = document.createElement("button");
            btn.innerText = `${currentUser.department} ${year} (${["1st", "2nd", "3rd"][year - 1]} Year)`;
            btn.onclick = () => selectYear(year);
            yearButtonsDiv.appendChild(btn);
        }

        // Function to set year and go to student section page
        function selectYear(year) {
            localStorage.setItem("year", year);
            // Navigate to the Department Admin Dashboard Related Year
            window.location.href = "departmentAdmin-dashboard.html";
        }
    </script>

</body>

</html>
