<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>THRC</title>

    <!-- ✅ Mobile support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="img/logo.png">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            background: #eaf3ff;
        }

        /* ===== HEADER ===== */
        .header {
            background: #0066cc;
            color: white;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            padding: 10px;
        }

        .logo {
            height: 40px;
        }

        .title {
            flex: 1;
            text-align: center;
            font-size: 16px;
        }

        /* ===== CENTER ===== */
        .center {
            text-align: center;
        }

        /* ===== LOGIN BOX ===== */
        .login-box {
            margin-top: 120px;
        }

        /* ===== INPUT ===== */
        input {
            padding: 10px;
            margin: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 250px;
        }

        /* ===== BUTTON ===== */
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #0066cc;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #004a99;
        }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {

            .header {
                flex-direction: column;
                text-align: center;
            }

            .title {
                width: 100%;
                margin-top: 5px;
            }

            input {
                width: 90%;
            }

            button {
                width: 90%;
                max-width: 300px;
            }

            .login-box {
                margin-top: 80px;
            }
        }
    </style>
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <img src="img/thanthai-hans-roever-college-1.png" class="logo">
        <h2 class="title">Roevers College Attendance System</h2>
    </header>

    <!-- ===== LOGIN ===== -->
    <div class="center login-box">
        <input id="loginUser" placeholder="Username"><br>
        <input id="loginPass" type="password" placeholder="Password">
    </div>

    <div class="center">
        <button id="loginBtn">Login</button>
    </div>

    <div id="loginMsg" class="center"></div>

    <script src="login.js" defer></script>

</body>

</html>
