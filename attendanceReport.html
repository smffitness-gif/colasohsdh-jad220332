<!DOCTYPE html>
<html>

<head>
    <title>Report</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <header class="header">
        <img src="img/thanthai-hans-roever-college-1.png" alt="Logo" class="logo">
        <h2 class="center" style="padding-left: 35%;">Roevers College Attendance System</h2>
    </header>


    <h2 style="justify-content: center; text-align: center; color: aliceblue;">Attendance Report</h2>

    From <input type="date" id="fromDate">
    To <input type="date" id="toDate">

    <button onclick="generateReport()">Generate</button>
    <button onclick="downloadPDF()">Download PDF</button>


    <table border="1">
        <thead>
            <button class="red" onclick="location.href='departmentAdmin-dashboard.html'">Back</button>

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Total Days</th>
                <th>Absent</th>
                <th>Present</th>
                <th>%</th>
            </tr>
        </thead>
        <tbody id="reportBody"></tbody>
    </table>


    <script src="generateReport.js"></script>

</body>

</html>
