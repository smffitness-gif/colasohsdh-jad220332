<!DOCTYPE html>
<html>

<head>
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="loadHome()">
    <header class="header">
        <img src="img/thanthai-hans-roever-college-1.png" alt="Logo" class="logo">
        <h2 class="center" style="padding-left: 35%;">Roevers College Attendance System</h2>
    </header>


    <div class="container center">

        <h3 id="userInfo"></h3>

        <button onclick="goToPage('register.html')">Register Student</button>
        <button onclick="goToPage('attendanceReport.html')">Report</button>
        <button class="blue" onclick="location.href='departmentAdmin.html'">Select Year</button>

        <button class="red" onclick="logout()">Logout</button>

    </div>

    <script>
        // Get current user from localStorage
        const currentUser = JSON.parse(localStorage.getItem("currentUser"));

        function loadHome() {
            if (!currentUser) {
                window.location.href = "index.html"; // not logged in
                return;
            }

            document.getElementById("userInfo").innerText =
                `${currentUser.department} Department - ${currentUser.role}`;
        }

        function goToPage(page) {
            // Check if year is set
            const year = localStorage.getItem("year");
            if (!year) {
                alert("Please select a year first on the Department Admin Dashboard.");
                window.location.href = "departmentAdmin.html";
                return;
            }

            // If year is set, go to the page
            window.location.href = page;
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }
    </script>
</body>

</html>
